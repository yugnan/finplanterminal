name: Update daily media news

on:
  schedule:
    # 00:00 UTC = 07:00 WIB
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - run: npm run fetch-news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- terminal/data/media-news.json; then
            git add terminal/data/media-news.json
            git commit -m "Update daily media news"
            git push
          else
            echo "No changes to media-news.json"
          fi
